name: Backend CI/CD

on:
  push:
    branches:
      - main  # Change if your main branch is different

jobs:
  backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: /home/dick_endra/Documents/collab-backend  # Path to backend Dockerfile
          push: true
          tags: dixam/collab-backend-api:latest

      - name: SSH & Deploy Backend
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/azureuser  # Path where docker-compose.yml lives
            docker compose pull
            docker compose up -d