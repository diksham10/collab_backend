name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3


      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build & Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: dixam/collab-backend-api:latest


      - name: Deploy via SSH (Blue Green)
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |

            cd /home/azureuser

            echo "Pull latest backend image"
            docker pull dixam/collab-backend-api:latest


            echo "Detect active container"

            ACTIVE=$(docker exec nginx grep 'server api-' /etc/nginx/nginx.conf | awk '{print $2}' | cut -d':' -f1)

            echo "Active environment: $ACTIVE"


            if [ "$ACTIVE" = "api-blue" ]; then
              NEW="api-green"
              OLD="api-blue"
              PORT=8002
            else
              NEW="api-blue"
              OLD="api-green"
              PORT=8001
            fi


            echo "Starting new environment: $NEW"

            docker stop $NEW || true
            docker rm $NEW || true

            docker run -d \
              --name $NEW \
              --network backend \
              --env-file /home/azureuser/.env \
              -p $PORT:8000 \
              -e ENV=production \
              -e DATABASE_URL=postgresql+asyncpg://test:test@postgres:5432/test \
              -e REDIS_URL=redis://redis:6379 \
              dixam/collab-backend-api:latest


            echo "Waiting for container to boot"
            sleep 10


            echo "Running health check"
            curl -f http://localhost:$PORT/health


            echo "Switching nginx upstream"

            docker exec nginx sed -i "s/server $OLD:8000;/server $NEW:8000;/" /etc/nginx/nginx.conf


            echo "Reload nginx (no downtime)"
            docker exec nginx nginx -s reload


            echo "Stopping old environment"
            docker stop $OLD
            docker rm $OLD


            echo "Deployment complete"